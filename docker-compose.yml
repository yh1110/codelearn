services:
  db:
    image: postgres:16-alpine
    container_name: codelearn-db
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: codelearn
      POSTGRES_PASSWORD: codelearn
      POSTGRES_DB: codelearn
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codelearn -d codelearn"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
