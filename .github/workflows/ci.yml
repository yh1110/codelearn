name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      # Explicit prisma generate step for CI log visibility
      # (postinstall also runs it, but a separate step is easier to debug).
      - run: npx prisma generate
      # Generate Next.js 16 route types (PageProps<"/courses/[slug]"> etc.)
      # so that tsc --noEmit can resolve them without a full build.
      - run: npx next typegen
      - name: Biome check (GitHub annotations)
        run: npx biome check --reporter=github .
      - run: npx tsc --noEmit
