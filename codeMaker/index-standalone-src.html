<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>codeMaker — モノづくりで学ぶ競プロ学習プラットフォーム</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/app.css" />

  <!-- Thumbnail splash shown while the bundle unpacks / when JS is disabled -->
  <template id="__bundler_thumbnail" data-bg-color="#141420">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="mk" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"  stop-color="oklch(0.68 0.18 265)"/>
          <stop offset="100%" stop-color="oklch(0.68 0.16 250)"/>
        </linearGradient>
      </defs>
      <rect x="440" y="280" width="320" height="240" rx="40" fill="url(#mk)"/>
      <text x="600" y="445" text-anchor="middle"
        font-family="ui-monospace, JetBrains Mono, monospace"
        font-size="112" font-weight="700" fill="#ffffff">&lt;/&gt;</text>
      <text x="600" y="610" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="44" font-weight="700" fill="#d7d4c5">codeMaker</text>
      <text x="600" y="658" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="20" font-weight="400" fill="#9a9684">モノづくりで学ぶ競プロ</text>
    </svg>
  </template>

  <!-- React + Babel — MUST load before Monaco AMD loader, which hijacks window.define and breaks UMD -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Standalone flag: tells MonacoEditor to render a static fallback -->
  <script>
    window.__STANDALONE__ = true;
    window.__TWEAKS = /*EDITMODE-BEGIN*/{
      "accentHue": 265
    }/*EDITMODE-END*/;
  </script>

  <!-- Components, in dependency order -->
  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/data.jsx"></script>
  <script type="text/babel" src="src/shell.jsx"></script>
  <script type="text/babel" src="src/page_home.jsx"></script>
  <script type="text/babel" src="src/page_explore.jsx"></script>
  <script type="text/babel" src="src/page_collection.jsx"></script>
  <script type="text/babel" src="src/page_problem.jsx"></script>
  <script type="text/babel" src="src/page_create.jsx"></script>
  <script type="text/babel" src="src/page_me.jsx"></script>
  <script type="text/babel" src="src/page_profile.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
