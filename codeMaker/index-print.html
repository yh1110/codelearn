<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>codeMaker — Print</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/app.css" />

  <style>
    /* ---------- Print layout ----------
       Each route is rendered into its own .print-page.
       We use a custom landscape-ish page size sized to the app's
       design width (1280px) so everything renders without reflow.
    */
    :root {
      --print-w: 1280px;
      --print-h: 1800px;
    }

    html, body {
      background: var(--bg-0);
      margin: 0;
      padding: 0;
    }

    #print-root {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .print-page {
      width: var(--print-w);
      height: var(--print-h);
      overflow: hidden;
      background: var(--bg-0);
      position: relative;
      break-after: page;
      page-break-after: always;
      display: flex;
      flex-direction: column;
      border-bottom: 1px dashed oklch(0.3 0.01 280 / 0.4); /* screen-only hint */
    }
    .print-page:last-child {
      break-after: auto;
      page-break-after: auto;
      border-bottom: none;
    }

    /* Each page hosts its own app shell */
    .print-page .app {
      min-height: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Un-stick the topbar so multiple copies don't overlap */
    .print-page .topbar,
    .print-page .problem-topbar {
      position: static;
    }

    /* Force vh-based pages to a fixed size within the print page */
    .print-page .page.full {
      height: calc(var(--print-h) - 57px);
    }
    .print-page .create-edit-shell,
    .print-page .problem-shell {
      height: calc(var(--print-h) - 57px);
    }

    /* Screen-only label above each print page */
    .print-label {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      font-family: var(--font-mono);
      font-size: 11px;
      color: oklch(0.6 0.02 280);
      background: oklch(0.14 0.008 280 / 0.9);
      padding: 3px 10px;
      border-radius: 999px;
      pointer-events: none;
      letter-spacing: 0.04em;
    }

    /* Tweaks panel must not appear in the print version */
    .tweaks-panel,
    #tweaks-panel-host { display: none !important; }

    /* ---------- Print media ---------- */
    @media print {
      @page {
        size: 1280px 1800px;
        margin: 0;
      }
      html, body {
        background: white;
      }
      #print-root {
        gap: 0;
      }
      .print-page {
        border-bottom: none !important;
        box-shadow: none !important;
      }
      .print-label { display: none !important; }

      /* Preserve all colors & backgrounds */
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* Kill animations / transitions */
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }

    /* Loading splash while we render */
    #print-loading {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: var(--bg-0);
      color: var(--text-2);
      font-family: var(--font-sans);
      z-index: 9999;
      gap: 12px;
      flex-direction: column;
    }
    #print-loading .spinner {
      width: 32px; height: 32px;
      border: 3px solid oklch(0.3 0.01 280);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media print { #print-loading { display: none !important; } }
  </style>
</head>
<body>
  <div id="print-loading">
    <div style="display:flex; flex-direction:column; align-items:center; gap: 14px;">
      <div class="spinner"></div>
      <div style="font-size: 13px; opacity: 0.8;">Preparing print view…</div>
    </div>
  </div>

  <div id="print-root"></div>

  <!-- React + Babel — MUST load before Monaco AMD loader -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Monaco AMD loader (after React) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script>

  <script>
    window.__TWEAKS = /*EDITMODE-BEGIN*/{
      "accentHue": 265
    }/*EDITMODE-END*/;
  </script>

  <!-- App modules, in dependency order (no app.jsx — we replace it with print.jsx) -->
  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/data.jsx"></script>
  <script type="text/babel" src="src/shell.jsx"></script>
  <script type="text/babel" src="src/page_home.jsx"></script>
  <script type="text/babel" src="src/page_explore.jsx"></script>
  <script type="text/babel" src="src/page_collection.jsx"></script>
  <script type="text/babel" src="src/page_problem.jsx"></script>
  <script type="text/babel" src="src/page_create.jsx"></script>
  <script type="text/babel" src="src/page_me.jsx"></script>
  <script type="text/babel" src="src/page_profile.jsx"></script>

  <!-- Print-specific app -->
  <script type="text/babel" src="src/print.jsx"></script>
</body>
</html>
